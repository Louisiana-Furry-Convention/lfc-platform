name: Deploy Staging

on:
  push:
    tags:
      - "v*"

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy to staging over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: GITHUB_REF_NAME
          script: |
            cd ~/lfc-platform
            ./scripts/deploy_release.sh staging ${GITHUB_REF_NAME}
