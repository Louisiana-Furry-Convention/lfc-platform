<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LFC Platform</title>
  <link rel="icon" href="data:," />
</head>
<body>
  <script type="module">
    import { restoreSession, loadUser } from "/assets/js/auth.js";

    async function boot() {
      const session = await restoreSession();

      if (!session) {
        window.location.href = "/login.html";
        return;
      }

      const user = loadUser();

      if (user && ["admin", "director", "officer"].includes(user.role)) {
        window.location.href = "/admin.html";
        return;
      }

      window.location.href = "/applications.html";
    }

    boot();
  </script>
</body>
</html>
