<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LFC Registration (Edge)</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items: flex-start; }
    .card { border:1px solid #ddd; border-radius:10px; padding:12px; min-width:320px; flex:1; }
    input, button { padding:8px; margin:6px 0; width:100%; box-sizing:border-box; }
    table { width:100%; border-collapse: collapse; margin-top:8px; }
    th, td { border-bottom:1px solid #eee; padding:8px; text-align:left; font-size: 14px; }
    code { background:#f6f6f6; padding:2px 4px; border-radius:6px; }
    .ok { color: #0a7; white-space: pre-wrap; }
    .err { color: #b00; white-space: pre-wrap; }
    .muted { color:#666; font-size: 13px; }
    .btnrow { display:flex; gap:8px; }
    .btnrow button { width:auto; flex:1; }
  </style>
</head>
<body>
  <h1>LFC Registration (Edge)</h1>
  <div class="muted">Served from the Pi. This is the staff-facing prototype UI.</div>

  <div class="card">
    <div class="btnrow">
      <button onclick="loadAll()">Reload Data</button>
      <button onclick="ping()">Health</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="row">
    <div class="card">
      <h2>Events</h2>
      <table>
        <thead><tr><th>ID</th><th>Name</th></tr></thead>
        <tbody id="eventsBody"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Tickets</h2>
      <table>
        <thead>
          <tr>
            <th>Ticket</th>
            <th>Status</th>
            <th>Email</th>
            <th>Name</th>
          </tr>
        </thead>
        <tbody id="ticketsBody"></tbody>
      </table>
    </div>
  </div>

  <div class="row">
    <div class="card">
      <h2>Issue Ticket</h2>
      <input id="itEmail" placeholder="attendee email" value="attendee1@example.com" />
      <input id="itName" placeholder="display name" value="Attendee One" />
      <input id="itEvent" placeholder="event_id" value="lfc-2027" />
      <input id="itType" placeholder="ticket_type_id" value="lfc-2027-regular" />
      <button onclick="issueTicket()">Issue</button>
      <div><strong>Result</strong></div>
      <div id="issueOut"></div>
    </div>

    <div class="card">
      <h2>Check-in</h2>
      <input id="ciToken" placeholder="qr_token" />
      <input id="ciStaff" placeholder="performed_by_user_id (staff)" />
      <input id="ciLane" placeholder="lane" value="main" />
      <button onclick="checkIn()">Check In</button>
      <div><strong>Result</strong></div>
      <div id="checkOut"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    async function api(path, opts={}) {
      const res = await fetch(path, { headers: { "content-type":"application/json" }, ...opts });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch { data = text; }
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}\n${typeof data==="string"?data:JSON.stringify(data,null,2)}`);
      return data;
    }

    function show(el, obj, ok=true) {
      el.className = ok ? "ok" : "err";
      el.textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
    }

    async function ping() {
      try {
        const out = await api("/health");
        show($("status"), out, true);
      } catch (e) {
        show($("status"), String(e), false);
      }
    }

    async function loadAll() {
      await ping();

      // Events
      try {
        const events = await api("/events");
        const body = $("eventsBody");
        body.innerHTML = "";
        for (const e of events) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td><code>${e.id}</code></td><td>${e.name}</td>`;
          body.appendChild(tr);
        }
      } catch (e) {
        show($("status"), "Events load failed:\n" + String(e), false);
      }

      // Tickets
      try {
        const tickets = await api("/tickets");
        const body = $("ticketsBody");
        body.innerHTML = "";
        for (const t of tickets) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><code title="${t.ticket_id}">${t.ticket_id.slice(0,8)}…</code></td>
            <td>${t.status}</td>
            <td>${t.email || ""}</td>
            <td>${t.display_name || ""}</td>
          `;
          body.appendChild(tr);
        }
      } catch (e) {
        // Not fatal; if /tickets doesn't exist yet, you'll see this until we add it
        show($("status"), "Tickets load failed (add /tickets endpoint):\n" + String(e), false);
      }
    }

    async function issueTicket() {
      try {
        const payload = {
          email: $("itEmail").value,
          display_name: $("itName").value,
          event_id: $("itEvent").value,
          ticket_type_id: $("itType").value,
        };
        const out = await api("/tickets/issue_test", { method:"POST", body: JSON.stringify(payload) });
        show($("issueOut"), out, true);
        $("ciToken").value = out.qr_token || "";
        await loadAll();
      } catch (e) {
        show($("issueOut"), String(e), false);
      }
    }

    async function checkIn() {
      try {
        const payload = {
          qr_token: $("ciToken").value,
          performed_by_user_id: $("ciStaff").value,
          lane: $("ciLane").value,
        };
        const out = await api("/checkin", { method:"POST", body: JSON.stringify(payload) });
        show($("checkOut"), out, true);
        await loadAll();
      } catch (e) {
        show($("checkOut"), String(e), false);
      }
    }

    loadAll();
  </script>
</body>
</html>
