<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LFC Stats</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/pages/stats.css" />
</head>
<body>
  <main class="page page-stats">
    <header class="page-header">
      <div>
        <h1>Operational Stats</h1>
        <p>Quick convention metrics</p>
      </div>
      <div class="page-actions">
        <a href="/admin.html" class="button secondary">Dashboard</a>
      </div>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Applications</div>
        <div id="stat-applications" class="stat-value">—</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Check-Ins</div>
        <div id="stat-checkins" class="stat-value">—</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Tickets</div>
        <div id="stat-tickets" class="stat-value">—</div>
      </div>
    </section>
  </main>

  <script type="module" src="/assets/js/pages/stats.js"></script>
</body>
</html>
